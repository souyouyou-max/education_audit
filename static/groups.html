<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学历证件稽核系统</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1b26;
      color: #c0caf5;
      min-height: 100vh;
    }
    .header {
      position: sticky;
      top: 0;
      background: #16161e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      z-index: 100;
      border-bottom: 1px solid #363b54;
    }
    .header h1 { font-size: 1rem; font-weight: 600; margin: 0; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header select {
      background: #24283b;
      color: #c0caf5;
      border: 1px solid #414868;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    .summary { font-size: 0.8rem; color: #565f89; }

    /* 标签页 */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 16px;
      background: #16161e;
      border-bottom: 1px solid #363b54;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #565f89;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #c0caf5; }
    .tab-btn.active { color: #7aa2f7; border-bottom-color: #7aa2f7; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 分组查看样式 */
    .loading, .error { padding: 48px 24px; text-align: center; }
    .error { color: #f7768e; }
    .groups-list {
      padding: 12px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .group-card {
      background: #24283b;
      border-radius: 10px;
      border: 1px solid #363b54;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .group-card.abnormal { border-color: #7aa2f760; }
    .group-card.abnormal.open { border-color: #bb9af7; }
    .group-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
      transition: background 0.15s;
    }
    .group-header:hover { background: #2a2f45; }
    .group-title { font-size: 0.92rem; font-weight: 600; flex: 1; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-count { background: #363b54; color: #a9b1d6; }
    .badge-abnormal { background: #bb9af7; color: #1a1b26; }
    .badge-noise { background: #363b54; color: #565f89; }
    .toggle-icon {
      color: #414868;
      font-size: 0.7rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .group-card.open .toggle-icon { transform: rotate(90deg); }
    .group-images {
      display: none;
      overflow-x: auto;
      padding: 0 12px 14px;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .group-images::-webkit-scrollbar { height: 5px; }
    .group-images::-webkit-scrollbar-track { background: #1e2030; border-radius: 3px; }
    .group-images::-webkit-scrollbar-thumb { background: #414868; border-radius: 3px; }
    .group-card.open .group-images { display: flex; }
    .img-card {
      flex: 0 0 auto;
      width: 260px;
      background: #1a1b26;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #2f3249;
    }
    .img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #16161e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .img-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .img-name {
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #565f89;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 欺诈检测面板样式 */
    .fraud-panel { padding: 16px; }
    .fraud-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #7aa2f7; color: #1a1b26; }
    .btn-primary:hover:not(:disabled) { background: #6690e0; }
    .btn-secondary { background: #24283b; color: #c0caf5; border: 1px solid #414868; }
    .btn-secondary:hover:not(:disabled) { background: #2a2f45; }
    .phash-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #565f89;
      cursor: pointer;
    }
    .phash-label input { cursor: pointer; }

    .fraud-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #24283b;
      border: 1px solid #363b54;
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 120px;
    }
    .stat-card .stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card .stat-label { font-size: 0.75rem; color: #565f89; margin-top: 4px; }
    .stat-card.danger .stat-val { color: #f7768e; }
    .stat-card.warn .stat-val { color: #e0af68; }
    .stat-card.ok .stat-val { color: #9ece6a; }

    .fraud-message {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .fraud-message.ok { background: #9ece6a20; color: #9ece6a; border: 1px solid #9ece6a40; }
    .fraud-message.warn { background: #e0af6820; color: #e0af68; border: 1px solid #e0af6840; }
    .fraud-message.danger { background: #f7768e20; color: #f7768e; border: 1px solid #f7768e40; }

    .issues-list { display: flex; flex-direction: column; gap: 8px; }
    .issue-card {
      background: #24283b;
      border-radius: 8px;
      border: 1px solid #363b54;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .issue-card.high { border-left: 3px solid #f7768e; }
    .issue-card.mid  { border-left: 3px solid #e0af68; }
    .issue-card.low  { border-left: 3px solid #565f89; }
    .severity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .severity-dot.high { background: #f7768e; }
    .severity-dot.mid  { background: #e0af68; }
    .severity-dot.low  { background: #565f89; }
    .issue-body { flex: 1; min-width: 0; }
    .issue-rule {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .issue-rule .sev-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.68rem;
      font-weight: 700;
      margin-left: 8px;
      vertical-align: middle;
    }
    .sev-badge.high { background: #f7768e30; color: #f7768e; }
    .sev-badge.mid  { background: #e0af6830; color: #e0af68; }
    .sev-badge.low  { background: #56508930; color: #565f89; }
    .issue-detail { font-size: 0.8rem; color: #a9b1d6; line-height: 1.5; }
    .issue-ids {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .id-chip {
      display: inline-block;
      background: #363b54;
      color: #7aa2f7;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 0.72rem;
      cursor: pointer;
      text-decoration: none;
    }
    .id-chip:hover { background: #414868; }

    /* 单张分析弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000080;
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #24283b;
      border: 1px solid #414868;
      border-radius: 12px;
      width: min(640px, 95vw);
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title { font-size: 1rem; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      color: #565f89;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .modal-close:hover { color: #c0caf5; background: #363b54; }
    .modal-loading { text-align: center; padding: 32px; color: #565f89; }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .field-item { background: #1a1b26; border-radius: 6px; padding: 8px 12px; }
    .field-key { font-size: 0.7rem; color: #565f89; margin-bottom: 2px; }
    .field-val { font-size: 0.85rem; color: #c0caf5; }
    .field-val.empty { color: #363b54; }
    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: #7aa2f7;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 14px 0 8px;
    }
    .risk-level {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .risk-level.高 { background: #f7768e30; color: #f7768e; }
    .risk-level.中 { background: #e0af6830; color: #e0af68; }
    .risk-level.低 { background: #9ece6a30; color: #9ece6a; }
    .risk-flag {
      display: inline-flex;
      align-items: center;
      background: #f7768e15;
      color: #f7768e;
      border: 1px solid #f7768e30;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      margin: 3px;
    }
    .forensic-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #363b54;
      font-size: 0.82rem;
    }
    .forensic-row:last-child { border-bottom: none; }
    .forensic-key { color: #565f89; }
    .forensic-ok { color: #9ece6a; }
    .forensic-warn { color: #f7768e; }
  </style>
</head>
<body>
  <header class="header">
    <h1>学历证件稽核系统</h1>
    <div class="header-right">
      <span class="summary" id="summary"></span>
      <select id="vectorField" style="display:none;">
        <option value="template_vector">模板向量</option>
        <option value="image_vector">图像向量</option>
        <option value="face_vector">人脸向量</option>
      </select>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="cluster">分组查看</button>
    <button class="tab-btn" data-tab="fraud">欺诈检测</button>
    <a href="/ocr" style="margin-left:auto;padding:10px 16px;font-size:0.875rem;color:#565f89;text-decoration:none;align-self:stretch;display:flex;align-items:center;" onmouseenter="this.style.color='#c0caf5'" onmouseleave="this.style.color='#565f89'">OCR 清单</a>
    <a href="/admin" style="padding:10px 16px;font-size:0.875rem;color:#565f89;text-decoration:none;align-self:stretch;display:flex;align-items:center;" onmouseenter="this.style.color='#c0caf5'" onmouseleave="this.style.color='#565f89'">运营管理</a>
  </nav>

  <!-- 分组查看标签页 -->
  <div id="tab-cluster" class="tab-panel active">
    <div style="display:flex;align-items:center;gap:12px;padding:10px 16px 0;">
      <span style="font-size:0.8rem;color:#565f89;">聚类方式：</span>
      <select id="vectorField2" style="background:#24283b;color:#c0caf5;border:1px solid #414868;padding:6px 10px;border-radius:6px;font-size:0.875rem;">
        <option value="template_vector">模板向量</option>
        <option value="image_vector">图像向量</option>
        <option value="face_vector">人脸向量</option>
      </select>
    </div>
    <div class="loading" id="loading">正在加载聚类结果…</div>
    <div class="error" id="clusterError" style="display:none;"></div>
    <div class="groups-list" id="groupsList" style="display:none;"></div>
  </div>

  <!-- 欺诈检测标签页 -->
  <div id="tab-fraud" class="tab-panel">
    <div class="fraud-panel">
      <div class="fraud-toolbar">
        <button class="btn btn-primary" id="btnValidate">运行交叉核验</button>
        <label class="phash-label">
          <input type="checkbox" id="chkPhash" />
          同时检测区域图像雷同（较慢）
        </label>
      </div>

      <div id="fraudStats" style="display:none;">
        <div class="fraud-summary" id="fraudSummary"></div>
        <div class="fraud-message" id="fraudMessage"></div>
        <div class="issues-list" id="issuesList"></div>
      </div>
      <div class="loading" id="fraudLoading" style="display:none;">正在分析，请稍候…</div>
      <div class="error" id="fraudError" style="display:none;"></div>
      <div id="fraudEmpty" style="padding:48px 24px;text-align:center;color:#565f89;display:none;">
        点击「运行交叉核验」开始检测
      </div>
    </div>
  </div>

  <!-- 单张分析弹窗 -->
  <div class="modal-overlay" id="analyzeModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">证件分析</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div id="modalContent"><div class="modal-loading">正在分析…</div></div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    // ── 标签页切换 ─────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'cluster') {
          document.getElementById('summary').style.display = '';
        } else {
          document.getElementById('summary').style.display = 'none';
        }
      });
    });

    // ── 分组查看 ───────────────────────────────────────
    function getImageUrl(id) { return API_BASE + '/api/image/' + id; }

    async function loadCluster() {
      const field = document.getElementById('vectorField2').value;
      const res = await fetch(API_BASE + '/cluster?vector_field=' + encodeURIComponent(field));
      if (!res.ok) throw new Error('聚类接口请求失败: ' + res.status);
      return res.json();
    }

    function renderCluster(data) {
      const list = document.getElementById('groupsList');
      const idToName = data.id_to_filename || {};
      const abnormalSet = new Set((data.abnormal_groups || []).map(ag => String(ag.group_id)));
      const groups = data.groups || [];

      const realGroups = groups.filter(g => !(typeof g.group_id === 'string' && g.group_id.startsWith('noise_')));
      const noiseCount = groups.length - realGroups.length;
      document.getElementById('summary').textContent =
        realGroups.length + ' 组 · ' + data.total_items + ' 张' + (noiseCount ? ' · ' + noiseCount + ' 单点' : '');

      list.innerHTML = '';

      const sorted = [...groups].sort((a, b) => {
        const aNoise = typeof a.group_id === 'string' && a.group_id.startsWith('noise_');
        const bNoise = typeof b.group_id === 'string' && b.group_id.startsWith('noise_');
        if (aNoise !== bNoise) return aNoise ? 1 : -1;
        const aAb = abnormalSet.has(String(a.group_id));
        const bAb = abnormalSet.has(String(b.group_id));
        if (aAb !== bAb) return aAb ? -1 : 1;
        return b.count - a.count;
      });

      sorted.forEach(g => {
        const isAbnormal = abnormalSet.has(String(g.group_id));
        const isNoise = typeof g.group_id === 'string' && g.group_id.startsWith('noise_');
        const card = document.createElement('div');
        card.className = 'group-card' + (isAbnormal ? ' abnormal' : '');
        const titleText = isNoise ? '未归组（单点）' : '分组 ' + g.group_id;
        const header = document.createElement('div');
        header.className = 'group-header';
        header.innerHTML =
          '<span class="group-title">' + titleText + '</span>' +
          (isAbnormal ? '<span class="badge badge-abnormal">异常组</span>' : '') +
          (isNoise ? '<span class="badge badge-noise">噪声</span>' : '') +
          '<span class="badge badge-count">' + g.count + ' 张</span>' +
          '<span class="toggle-icon">▶</span>';
        const imagesDiv = document.createElement('div');
        imagesDiv.className = 'group-images';
        let built = false;
        header.addEventListener('click', () => {
          const isOpen = card.classList.toggle('open');
          if (isOpen && !built) {
            built = true;
            (g.items || []).forEach(id => {
              const name = idToName[String(id)] || ('id:' + id);
              const imgCard = document.createElement('div');
              imgCard.className = 'img-card';
              imgCard.innerHTML =
                '<div class="img-wrap">' +
                  '<img src="' + getImageUrl(id) + '" alt="" loading="lazy"' +
                  ' onerror="this.parentElement.innerHTML=\'<span style=\\\'color:#565f89;font-size:0.8rem\\\'>无图</span>\'">' +
                '</div>' +
                '<div class="img-name">' + name + '</div>';
              imagesDiv.appendChild(imgCard);
            });
          }
        });
        card.appendChild(header);
        card.appendChild(imagesDiv);
        list.appendChild(card);
      });

      list.style.display = 'flex';
    }

    document.getElementById('vectorField2').addEventListener('change', runCluster);

    async function runCluster() {
      const loading = document.getElementById('loading');
      const err = document.getElementById('clusterError');
      const list = document.getElementById('groupsList');
      loading.style.display = 'block';
      loading.textContent = '正在加载聚类结果…';
      err.style.display = 'none';
      list.style.display = 'none';
      document.getElementById('summary').textContent = '';
      try {
        const data = await loadCluster();
        loading.style.display = 'none';
        renderCluster(data);
      } catch (e) {
        loading.style.display = 'none';
        err.style.display = 'block';
        err.textContent = e.message || String(e);
      }
    }

    // ── 欺诈检测 ───────────────────────────────────────
    document.getElementById('btnValidate').addEventListener('click', runFraudCheck);

    async function runFraudCheck() {
      const loading = document.getElementById('fraudLoading');
      const err = document.getElementById('fraudError');
      const stats = document.getElementById('fraudStats');
      const empty = document.getElementById('fraudEmpty');
      const btn = document.getElementById('btnValidate');
      const phash = document.getElementById('chkPhash').checked;

      loading.style.display = 'block';
      err.style.display = 'none';
      stats.style.display = 'none';
      empty.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '分析中…';

      try {
        const url = API_BASE + '/cross_validate?run_phash=' + phash;
        const res = await fetch(url);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || '请求失败: ' + res.status);
        }
        const data = await res.json();
        loading.style.display = 'none';
        renderFraudResult(data);
      } catch (e) {
        loading.style.display = 'none';
        err.style.display = 'block';
        err.textContent = e.message || String(e);
      } finally {
        btn.disabled = false;
        btn.textContent = '重新核验';
      }
    }

    function renderFraudResult(data) {
      const stats = document.getElementById('fraudStats');
      const summaryEl = document.getElementById('fraudSummary');
      const msgEl = document.getElementById('fraudMessage');
      const listEl = document.getElementById('issuesList');

      // 统计卡片
      const highCount = data.high_severity_count || 0;
      const totalIssues = data.issue_count || 0;
      const totalCerts = data.total_certs || 0;

      summaryEl.innerHTML =
        '<div class="stat-card ' + (totalCerts === 0 ? '' : 'ok') + '">' +
          '<div class="stat-val">' + totalCerts + '</div>' +
          '<div class="stat-label">参与核验证件</div>' +
        '</div>' +
        '<div class="stat-card ' + (data.ocr_success > 0 ? 'ok' : '') + '">' +
          '<div class="stat-val">' + (data.ocr_success || 0) + '</div>' +
          '<div class="stat-label">OCR成功</div>' +
        '</div>' +
        '<div class="stat-card ' + (totalIssues === 0 ? 'ok' : totalIssues < 3 ? 'warn' : 'danger') + '">' +
          '<div class="stat-val">' + totalIssues + '</div>' +
          '<div class="stat-label">发现问题</div>' +
        '</div>' +
        '<div class="stat-card ' + (highCount === 0 ? 'ok' : 'danger') + '">' +
          '<div class="stat-val">' + highCount + '</div>' +
          '<div class="stat-label">高风险问题</div>' +
        '</div>';

      // 消息提示
      const msgClass = highCount > 0 ? 'danger' : totalIssues > 0 ? 'warn' : 'ok';
      msgEl.className = 'fraud-message ' + msgClass;
      msgEl.textContent = data.message || '';

      // 问题列表
      listEl.innerHTML = '';
      const issues = (data.issues || []).sort((a, b) => {
        const order = { '高': 0, '中': 1, '低': 2 };
        return (order[a.severity] || 2) - (order[b.severity] || 2);
      });

      if (issues.length === 0) {
        listEl.innerHTML = '';
      } else {
        issues.forEach(issue => {
          const sevKey = issue.severity === '高' ? 'high' : issue.severity === '中' ? 'mid' : 'low';
          const card = document.createElement('div');
          card.className = 'issue-card ' + sevKey;

          let idsHtml = '';
          if (issue.related_ids && issue.related_ids.length > 0) {
            idsHtml = '<div class="issue-ids">';
            issue.related_ids.forEach(id => {
              idsHtml += '<a class="id-chip" href="#" onclick="openAnalyze(' + id + ');return false;">ID ' + id + '</a>';
            });
            idsHtml += '</div>';
          }

          card.innerHTML =
            '<div class="severity-dot ' + sevKey + '"></div>' +
            '<div class="issue-body">' +
              '<div class="issue-rule">' + escHtml(issue.rule) +
                '<span class="sev-badge ' + sevKey + '">' + issue.severity + '</span>' +
              '</div>' +
              '<div class="issue-detail">' + escHtml(issue.detail) + '</div>' +
              idsHtml +
            '</div>';
          listEl.appendChild(card);
        });
      }

      stats.style.display = 'block';
    }

    // ── 单张分析弹窗 ───────────────────────────────────
    function openAnalyze(entityId) {
      const modal = document.getElementById('analyzeModal');
      const title = document.getElementById('modalTitle');
      const content = document.getElementById('modalContent');
      title.textContent = '证件分析 — ID ' + entityId;
      content.innerHTML = '<div class="modal-loading">正在分析，请稍候…</div>';
      modal.classList.add('open');

      fetch(API_BASE + '/analyze/' + entityId)
        .then(r => {
          if (!r.ok) return r.json().then(b => { throw new Error(b.detail || '请求失败'); });
          return r.json();
        })
        .then(data => renderAnalyzeModal(data))
        .catch(e => {
          content.innerHTML = '<div class="error">' + escHtml(e.message || String(e)) + '</div>';
        });
    }

    function renderAnalyzeModal(data) {
      const content = document.getElementById('modalContent');
      const ocr = data.ocr_fields || {};
      const face = data.face_info || {};
      const forensic = data.forensic || {};
      const issues = data.rule_issues || [];
      const riskLevel = data.risk_level || '低';
      const flags = data.risk_flags || [];

      let html = '';

      // 基本信息
      html += '<div class="section-title">基本信息</div>';
      html += '<div class="field-grid">';
      const fields = [
        ['文件名', data.filename], ['学校', ocr.school], ['校长', ocr.principal],
        ['毕业年份', ocr.grad_year], ['入学年份', ocr.enrollment_year],
        ['发证年份', ocr.issue_year], ['性别', ocr.gender], ['出生年份', ocr.birth_year],
        ['证书编号', ocr.cert_no],
      ];
      fields.forEach(([k, v]) => {
        html += '<div class="field-item"><div class="field-key">' + k + '</div>' +
          '<div class="field-val' + (v ? '' : ' empty') + '">' + escHtml(v || '未识别') + '</div></div>';
      });
      html += '</div>';

      // 人脸属性
      if (face.age || face.gender) {
        html += '<div class="section-title">人脸属性</div>';
        html += '<div class="field-grid">';
        html += '<div class="field-item"><div class="field-key">年龄估计</div><div class="field-val">' + (face.age || '—') + ' 岁</div></div>';
        html += '<div class="field-item"><div class="field-key">性别判断</div><div class="field-val">' + escHtml(face.gender || '—') + '</div></div>';
        html += '</div>';
      }

      // 风险等级
      html += '<div class="section-title">风险评估</div>';
      html += '<div style="margin-bottom:10px;">';
      html += '风险等级：<span class="risk-level ' + riskLevel + '">' + riskLevel + '</span>';
      html += '</div>';
      if (flags.length > 0) {
        flags.forEach(f => { html += '<span class="risk-flag">' + escHtml(f) + '</span>'; });
      }

      // 图像取证
      if (Object.keys(forensic).length > 0 && !forensic.error) {
        html += '<div class="section-title">图像取证</div>';
        const ela = forensic.ela || {};
        const edge = forensic.photo_edge || {};
        const seal = forensic.seal || {};
        const rows = [
          ['ELA分析', ela.description, ela.is_suspicious],
          ['照片边缘', edge.description, edge.is_suspicious],
          ['印章检测', seal.description, seal.is_printed_seal],
        ];
        rows.forEach(([k, desc, isWarn]) => {
          if (!desc) return;
          html += '<div class="forensic-row">' +
            '<span class="forensic-key">' + k + '</span>' +
            '<span class="' + (isWarn ? 'forensic-warn' : 'forensic-ok') + '">' + escHtml(desc) + '</span>' +
            '</div>';
        });
      }

      // 规则校验问题
      if (issues.length > 0) {
        html += '<div class="section-title">规则校验问题</div>';
        issues.forEach(issue => {
          const sevKey = issue.severity === '高' ? 'high' : issue.severity === '中' ? 'mid' : 'low';
          html += '<div class="issue-card ' + sevKey + '" style="margin-bottom:6px;">' +
            '<div class="severity-dot ' + sevKey + '"></div>' +
            '<div class="issue-body">' +
              '<div class="issue-rule">' + escHtml(issue.rule) +
                '<span class="sev-badge ' + sevKey + '">' + issue.severity + '</span>' +
              '</div>' +
              '<div class="issue-detail">' + escHtml(issue.detail) + '</div>' +
            '</div></div>';
        });
      }

      if (issues.length === 0 && flags.length === 0) {
        html += '<div style="color:#9ece6a;font-size:0.85rem;padding:8px 0;">未发现异常</div>';
      }

      content.innerHTML = html;
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('analyzeModal').classList.remove('open');
    });
    document.getElementById('analyzeModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── 初始化 ─────────────────────────────────────────
    runCluster();
    document.getElementById('fraudEmpty').style.display = 'block';
  </script>
</body>
</html>
