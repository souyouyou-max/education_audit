<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图片搜索 — 学历证件稽核系统</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1b26;
      color: #c0caf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      background: #16161e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      z-index: 100;
      border-bottom: 1px solid #363b54;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1rem; font-weight: 600; margin: 0; }
    .header-nav { display: flex; gap: 8px; }
    .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      color: #565f89;
      text-decoration: none;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-link:hover { color: #c0caf5; border-color: #414868; }
    .nav-link.active { color: #7aa2f7; border-color: #7aa2f7; }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left-panel {
      width: 360px;
      flex-shrink: 0;
      border-right: 1px solid #363b54;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #7aa2f7;
      margin: 0;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed #414868;
      border-radius: 10px;
      background: #1f2335;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #7aa2f7;
      background: #1e2030;
    }
    .upload-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #565f89;
      pointer-events: none;
    }
    .upload-placeholder svg { opacity: 0.5; }
    .upload-placeholder p { margin: 0; font-size: 0.82rem; text-align: center; line-height: 1.5; }
    .preview-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    /* ── Form controls ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.8rem; color: #565f89; }
    .field select, .field input[type=number] {
      background: #24283b;
      color: #c0caf5;
      border: 1px solid #414868;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.875rem;
      width: 100%;
    }
    .field select:focus, .field input:focus {
      outline: none;
      border-color: #7aa2f7;
    }

    .btn-search {
      background: #7aa2f7;
      color: #1a1b26;
      border: none;
      border-radius: 7px;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }
    .btn-search:hover { background: #89b4ff; }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Right panel ── */
    .right-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #565f89;
      margin: 0;
    }
    .result-count {
      background: #363b54;
      color: #c0caf5;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Empty / loading state ── */
    .state-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #414868;
      gap: 12px;
      min-height: 200px;
    }
    .state-placeholder svg { opacity: 0.4; }
    .state-placeholder p { margin: 0; font-size: 0.875rem; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #363b54;
      border-top-color: #7aa2f7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result grid ── */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .result-card {
      background: #24283b;
      border: 1px solid #363b54;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.1s;
      cursor: pointer;
    }
    .result-card:hover { transform: translateY(-2px); border-color: #414868; }
    .result-card.abnormal { border-color: #bb9af7; }

    .result-img-wrap {
      aspect-ratio: 3/4;
      background: #1f2335;
      overflow: hidden;
      position: relative;
    }
    .result-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .score-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }
    .score-badge.normal { background: rgba(158, 206, 106, 0.2); color: #9ece6a; border: 1px solid #9ece6a55; }
    .score-badge.abnormal { background: rgba(247, 118, 142, 0.2); color: #f7768e; border: 1px solid #f7768e55; }

    .result-info {
      padding: 8px 10px;
    }
    .result-filename {
      font-size: 0.75rem;
      color: #565f89;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-id {
      font-size: 0.72rem;
      color: #414868;
      margin-top: 2px;
    }

    .error-msg {
      background: rgba(247, 118, 142, 0.1);
      border: 1px solid #f7768e44;
      border-radius: 8px;
      padding: 14px 16px;
      color: #f7768e;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

<header class="header">
  <h1>学历证件稽核系统</h1>
  <nav class="header-nav">
    <a class="nav-link" href="/view">分组查看</a>
    <a class="nav-link active" href="/search">图片搜索</a>
    <a class="nav-link" href="/admin">运营管理</a>
  </nav>
</header>

<div class="main">
  <!-- Left: upload + controls -->
  <div class="left-panel">
    <p class="panel-title">上传查询图片</p>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="upload-placeholder" id="placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>拖拽图片到此处<br/>或点击选择文件</p>
      </div>
      <img class="preview-img" id="previewImg" alt="预览" />
    </div>

    <div class="field">
      <label for="vectorField">搜索类型</label>
      <select id="vectorField">
        <option value="image_vector">图像相似（整体外观）</option>
        <option value="face_vector">人脸相似（同一人）</option>
        <option value="template_vector">模板相似（同类证书）</option>
      </select>
    </div>

    <div class="field">
      <label for="topK">返回数量</label>
      <input type="number" id="topK" value="10" min="1" max="50" />
    </div>

    <button class="btn-search" id="btnSearch" disabled>搜索相似图片</button>
  </div>

  <!-- Right: results -->
  <div class="right-panel" id="rightPanel">
    <div class="state-placeholder" id="statePlaceholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <path d="M11 8v6M8 11h6" opacity="0.5"/>
      </svg>
      <p>上传图片后点击「搜索相似图片」</p>
    </div>
  </div>
</div>

<script>
  const uploadZone = document.getElementById('uploadZone');
  const fileInput  = document.getElementById('fileInput');
  const placeholder = document.getElementById('placeholder');
  const previewImg  = document.getElementById('previewImg');
  const btnSearch   = document.getElementById('btnSearch');
  const rightPanel  = document.getElementById('rightPanel');
  const statePlaceholder = document.getElementById('statePlaceholder');

  let selectedFile = null;

  // ── File selection ──────────────────────────────────────
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) setFile(f);
  });

  function setFile(f) {
    selectedFile = f;
    const reader = new FileReader();
    reader.onload = ev => {
      previewImg.src = ev.target.result;
      previewImg.style.display = 'block';
      placeholder.style.display = 'none';
    };
    reader.readAsDataURL(f);
    btnSearch.disabled = false;
  }

  // ── Search ──────────────────────────────────────────────
  btnSearch.addEventListener('click', async () => {
    if (!selectedFile) return;

    const vectorField = document.getElementById('vectorField').value;
    const topK = parseInt(document.getElementById('topK').value) || 10;

    // Show loading
    btnSearch.disabled = true;
    rightPanel.innerHTML = `
      <div class="state-placeholder">
        <div class="spinner"></div>
        <p>正在搜索...</p>
      </div>`;

    try {
      const fd = new FormData();
      fd.append('file', selectedFile);
      fd.append('vector_field', vectorField);
      fd.append('top_k', topK);

      const resp = await fetch('/search_by_image', { method: 'POST', body: fd });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      renderResults(data.results || []);
    } catch (e) {
      rightPanel.innerHTML = `<div class="error-msg">搜索失败：${e.message}</div>`;
    } finally {
      btnSearch.disabled = false;
    }
  });

  // ── Render results ──────────────────────────────────────
  function renderResults(results) {
    if (!results.length) {
      rightPanel.innerHTML = `
        <div class="state-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>未找到相似图片</p>
        </div>`;
      return;
    }

    const abnormalCount = results.filter(r => r.abnormal).length;
    const headerHtml = `
      <div class="result-header">
        <p class="result-title">找到 ${results.length} 条结果</p>
        ${abnormalCount ? `<span class="result-count" style="background:#bb9af722;color:#bb9af7;border:1px solid #bb9af755">${abnormalCount} 条高度相似</span>` : ''}
      </div>`;

    const cardsHtml = results.map(r => {
      const scoreStr = (r.score * 100).toFixed(1) + '%';
      const isAbnormal = r.abnormal;
      return `
        <div class="result-card ${isAbnormal ? 'abnormal' : ''}" onclick="window.open('/api/image/${r.id}','_blank')">
          <div class="result-img-wrap">
            <img src="/api/image/${r.id}" alt="id=${r.id}" loading="lazy"
                 onerror="this.style.display='none'" />
            <span class="score-badge ${isAbnormal ? 'abnormal' : 'normal'}">${scoreStr}</span>
          </div>
          <div class="result-info">
            <div class="result-filename" title="id: ${r.id}">ID: ${r.id}</div>
            <div class="result-id">距离 ${r.distance.toFixed(4)}</div>
          </div>
        </div>`;
    }).join('');

    rightPanel.innerHTML = headerHtml + `<div class="result-grid">${cardsHtml}</div>`;
  }
</script>
</body>
</html>
